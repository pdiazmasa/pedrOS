<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport ──────────────────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Título ────────────────────────────────────────────── -->
    <title>pedrOS</title>

    <!-- ── Favicon estándar ──────────────────────────────────── -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- ── Apple / iOS PWA ───────────────────────────────────── -->
    <!-- Activa el modo "app" al añadir a pantalla de inicio -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Barra de estado translúcida (se mezcla con el fondo oscuro de la app) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Nombre que aparece bajo el icono en iOS -->
    <meta name="apple-mobile-web-app-title" content="pedrOS" />
    <!-- Icono para iOS (180×180 recomendado) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── Theme color (Chrome/Android barra del navegador) ──── -->
    <meta name="theme-color" content="#0f172a" />

    <!-- ── Open Graph básico ─────────────────────────────────── -->
    <meta property="og:title" content="pedrOS" />
    <meta property="og:description" content="Tu sistema operativo personal" />
    <meta property="og:image" content="/icon-512.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
